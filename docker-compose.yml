version: '3.8'

services:
  php:
    build: .
    container_name: telegram_bot_php
    restart: always
    volumes:
      - .:/var/www/telegram-bot
    depends_on:
      - db
    networks:
      - bot_network

  nginx:
    image: nginx:alpine
    container_name: telegram_bot_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/telegram-bot
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - bot_network

  db:
    image: mariadb:10.11
    container_name: telegram_bot_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  db_data:
